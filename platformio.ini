; ============================================================
;  platformio.ini  —  Tonewheel Organ
;
;  Two build environments:
;    pico_tone  — Raspberry Pi Pico  (RP2040, original)
;    pico2_tone — Raspberry Pi Pico 2 (RP2350)
;
;  Build target:
;    pio run -e pico_tone   (or pico2_tone)
;    pio run -e pico2_tone --target upload
; ============================================================

[common]
platform     = https://github.com/maxgerhardt/platform-raspberrypi.git
framework    = arduino
board_build.core = earlephilhower
lib_deps =
    https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git
    https://github.com/FortySevenEffects/arduino_midi_library.git
build_flags =
    -O2
    -DUSE_TINYUSB
    -DCFG_TUD_MIDI=1
monitor_speed = 115200

; ---- Raspberry Pi Pico (RP2040) ----------------------------
[env:pico_tone]
extends      = common
board        = rpipico
; 133 MHz default. Can safely overclock to 200-250MHz if needed.
; Uncomment to overclock: board_build.f_cpu = 200000000L

; ---- Raspberry Pi Pico 2 (RP2350) -------------------------
[env:pico2_tone]
extends      = common
board        = rpipico2
; RP2350 defaults to 150MHz. Has hardware FPU — float is free.
; Can overclock to 300MHz+ if needed.
; board_build.f_cpu = 200000000L
;
; Note: RP2350 uses the same earlephilhower core, same pin
; assignments, same PIO program. No source changes needed.
; The __not_in_flash_func() macro works on both cores.