; ============================================================
;  Tonewheel Organ - Tone Generator
;  Board : Raspberry Pi Pico (RP2040)
;  Core  : earlephilhower/arduino-pico
;  Audio : Waveshare Pico-Audio Rev 2.1 (CS4344) via PIO
;  MIDI  : USB-MIDI via Adafruit TinyUSB  +  UART MIDI (DIN)
; ============================================================
[env:pico_tone]
platform     = https://github.com/maxgerhardt/platform-raspberrypi.git
board        = rpipico
framework    = arduino
board_build.core = earlephilhower

; USB stack: earlephilhower uses Adafruit TinyUSB automatically
; when USE_TINYUSB is defined AND the lib is present.
; For USB-MIDI we need the Adafruit MIDI library on top.
lib_deps =
    https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git
    https://github.com/FortySevenEffects/arduino_midi_library.git

build_flags =
    -O2
    -DUSE_TINYUSB          ; activate TinyUSB stack in earlephilhower
    -DCFG_TUD_MIDI=1       ; enable TinyUSB MIDI class

monitor_speed = 115200