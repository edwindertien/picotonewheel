; ============================================================
;  platformio.ini  —  Tonewheel Organ
;
;  pico_tone  — Raspberry Pi Pico  (RP2040, 133 MHz)
;  pico2_tone — Raspberry Pi Pico 2 (RP2350, 200 MHz overclocked)
; ============================================================

[common]
platform         = https://github.com/maxgerhardt/platform-raspberrypi.git
framework        = arduino
board_build.core = earlephilhower
lib_deps =
    https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git
    https://github.com/FortySevenEffects/arduino_midi_library.git
build_flags =
    -O2
    -DUSE_TINYUSB
    -DCFG_TUD_MIDI=1
monitor_speed = 115200

; ---- Raspberry Pi Pico (RP2040, 133 MHz) -------------------
[env:pico_tone]
extends = common
board   = rpipico
; Set MAX_ACTIVE_VOICES 8 in config.h for Pico 1

; ---- Raspberry Pi Pico 2 (RP2350, 200 MHz) -----------------
[env:pico2_tone]
extends = common
board   = rpipico2
board_build.f_cpu = 200000000L
; 200 MHz is well within RP2350 capability.
; Can raise to 250 MHz: board_build.f_cpu = 250000000L
; At 250 MHz raise MAX_ACTIVE_VOICES to 20 in config.h