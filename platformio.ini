; ============================================================
;  platformio.ini  —  Tonewheel Organ with USB MIDI Host
;
;  pico2_tone   — Pico 2 (RP2350, 240 MHz) — USB MIDI host enabled
;  pico2_nohost — Pico 2 (RP2350, 200 MHz) — audio only, no USB host
;  pico_tone    — Pico 1 (RP2040, 133 MHz) — no USB host
;
;  USB host: one USB MIDI device on GP6/GP7.
;  Multi-device hub support is not reliable with this pio_usb version.
; ============================================================

[common]
platform         = https://github.com/maxgerhardt/platform-raspberrypi.git
framework        = arduino
board_build.core = earlephilhower
lib_deps =
    https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git
    https://github.com/FortySevenEffects/arduino_midi_library.git
monitor_speed = 115200

; ---- Pico 2 with USB MIDI host (240 MHz) -------------------
[env:pico2_tone]
extends           = common
board             = rpipico2
board_build.f_cpu = 240000000L
lib_deps =
    ${common.lib_deps}
build_flags =
    -O2
    -DUSE_TINYUSB
    -DCFG_TUD_MIDI=1
    -DCFG_TUH_ENABLED=1
    -DCFG_TUH_MIDI=1
    -DCFG_TUH_RPI_PIO_USB=1
    -DCFG_TUH_MAX_SPEED=OPT_MODE_FULL_SPEED
    -DCFG_TUH_HUB=1
    -DPIO_USB_DP_PIN_DEFAULT=6

; ---- Pico 2 without USB host (200 MHz) ---------------------
[env:pico2_nohost]
extends           = common
board             = rpipico2
board_build.f_cpu = 200000000L
build_flags =
    -O2
    -DUSE_TINYUSB
    -DCFG_TUD_MIDI=1
    -DENABLE_USB_HOST=0

; ---- Pico 1 (133 MHz, no USB host) -------------------------
[env:pico_tone]
extends = common
board   = rpipico
build_flags =
    -O2
    -DUSE_TINYUSB
    -DCFG_TUD_MIDI=1
    -DENABLE_USB_HOST=0