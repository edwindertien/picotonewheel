; ============================================================
;  Tonewheel Organ - Tone Generator
;  Board : Raspberry Pi Pico (RP2040)
;  Core  : earlephilhower/arduino-pico
;  Audio : Waveshare Pico-Audio Rev 2.1 (CS4344) via PIO
;
;  audio_pio.pio.h is pre-generated by pioasm and committed
;  alongside the source — no build-time codegen needed.
; ============================================================
[env:pico_tone]
platform     = https://github.com/maxgerhardt/platform-raspberrypi.git
board        = rpipico
framework    = arduino
board_build.core = earlephilhower

build_flags  = -O2

monitor_speed = 115200